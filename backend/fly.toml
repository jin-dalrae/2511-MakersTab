app = "makerstab-backend"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

[[vm]]
  # Plain FastAPI + Mongo client — light. No Chromium anymore.
  size = "shared-cpu-1x"
  memory = "512mb"

[deploy]
  strategy = "rolling"
  # OK to scale to zero now that there's no interactive scrape with a tight
  # MFA window — first request just pays a normal cold start.
  min_machines_running = 0
